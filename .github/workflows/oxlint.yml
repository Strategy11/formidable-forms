name: Oxlint

on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, labeled, synchronize]

jobs:
  runOxlintInspection:
    if: contains(github.event.pull_request.labels.*.name, 'run analysis')
    name: Run Oxlint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Install Oxlint
        run: npm install oxlint@^1.51.0

      - name: Run Oxlint
        run: ./node_modules/.bin/oxlint .
